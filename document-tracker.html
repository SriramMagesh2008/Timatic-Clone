<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Content-Security-Policy" content="
default-src 'self';
script-src 'self';
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src 'self' https://fonts.gstatic.com;
">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Tracker | Travel IO</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:radial-gradient(circle at top,#162a52,#070d1a);
    color:white;
}

/* container */
.container{
    max-width:900px;
    margin:40px auto;
    padding:30px;
    border-radius:22px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
}

/* header */
h1{
    text-align:center;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#b9c7e6;
    margin-bottom:25px;
}

/* form */
.form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

input, select{
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
}

option{
    background:#0f1f3d;
}

button{
    grid-column:span 2;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#1e90ff;
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    transform:translateY(-2px);
}

/* list */
.docs{
    margin-top:20px;
    display:grid;
    gap:12px;
}

.card{
    padding:15px;
    border-radius:14px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.type{
    font-size:12px;
    padding:4px 10px;
    border-radius:10px;
    background:#3b82f6;
}

.passport{ background:#22c55e; }
.visa{ background:#f59e0b; }
.id{ background:#a855f7; }
.ticket{ background:#ef4444; }

.delete{
    background:#ef4444;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<nav class="navbar" style="background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1);padding:16px 8%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;">
  <a href="index.html" style="display:flex;align-items:center;gap:8px;font-size:1.5rem;font-weight:700;text-decoration:none;">
    <span>✈️</span>
    <span style="background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Travel IO</span>
  </a>
  <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <a href="index.html" style="color:#94a3b8;text-decoration:none;font-weight:500;padding:8px 12px;border-radius:8px;">Dashboard</a>
    <a href="visa-requirement.html" style="color:#94a3b8;text-decoration:none;font-weight:500;padding:8px 12px;border-radius:8px;">Visa Check</a>
    <a href="travel-requirement.html" style="color:#94a3b8;text-decoration:none;font-weight:500;padding:8px 12px;border-radius:8px;">Travel Requirements</a>
    <a href="weather-alerts.html" style="color:#94a3b8;text-decoration:none;font-weight:500;padding:8px 12px;border-radius:8px;">Weather Alerts</a>
    <a href="risk.html" style="color:#94a3b8;text-decoration:none;font-weight:500;padding:8px 12px;border-radius:8px;">Risk Check</a>
    <a href="currency.html" style="color:#94a3b8;text-decoration:none;font-weight:500;padding:8px 12px;border-radius:8px;">Currency</a>
    <a href="document-tracker.html" style="color:#94a3b8;text-decoration:none;font-weight:500;padding:8px 12px;border-radius:8px;">Documents</a>
  </div>
</nav>

<div class="container">

<h1>📁 Document Tracker</h1>
<p class="subtitle">Store passports, visas and travel documents securely (local vault)</p>

<div class="form">

    <input id="title" placeholder="Document Title (e.g. Passport)">
    
    <select id="type">
        <option value="passport">Passport</option>
        <option value="visa">Visa</option>
        <option value="id">ID Card</option>
        <option value="ticket">Ticket</option>
    </select>

    <input id="country" placeholder="Country (optional)">

    <input id="expiry" type="date">

    <button onclick="addDoc()">+ Add Document</button>

</div>

<div class="docs" id="docs"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC51zVQ3u1bS1IsYlq5gDJf3zirQWXhwFw",
  authDomain: "travelio-4a9d1.firebaseapp.com",
  projectId: "travelio-4a9d1",
  storageBucket: "travelio-4a9d1.firebasestorage.app",
  messagingSenderId: "301041218270",
  appId: "1:301041218270:web:d7e4da3eda7b7755a2484f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


function addDoc(){

    const title = document.getElementById("title").value;
    const type = document.getElementById("type").value;
    const country = document.getElementById("country").value;
    const expiry = document.getElementById("expiry").value;

    if(!title){
        alert("Enter document title");
        return;
    }

    db.collection("documents").add({
        title,
        type,
        country,
        expiry,
        createdAt: Date.now()
    });

    document.getElementById("title").value = "";
    document.getElementById("country").value = "";
    document.getElementById("expiry").value = "";
}

function deleteDoc(id){
    db.collection("documents").doc(id).delete();
}

function render(){

    const container = document.getElementById("docs");
    container.innerHTML = "";

    db.collection("documents")
    .orderBy("createdAt","desc")
    .onSnapshot(snapshot => {

        container.innerHTML = "";

        snapshot.forEach(doc => {

            const d = doc.data();

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <div>
                    <strong>${d.title}</strong><br>
                    <small style="color:#b9c7e6">
                        ${d.country || "No country"} | Exp: ${d.expiry || "N/A"}
                    </small><br>
                    <span class="type ${d.type}">
                        ${d.type.toUpperCase()}
                    </span>
                </div>

                <button class="delete" onclick="deleteDoc('${doc.id}')">
                    Delete
                </button>
            `;

            container.appendChild(div);
        });
    });
}

render();

</script>

</body>
</html>
