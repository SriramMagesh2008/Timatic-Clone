<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Tracker | Travel IO</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:radial-gradient(circle at top,#162a52,#070d1a);
    color:white;
}

/* container */
.container{
    max-width:900px;
    margin:40px auto;
    padding:30px;
    border-radius:22px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
}

/* header */
h1{
    text-align:center;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#b9c7e6;
    margin-bottom:25px;
}

/* form */
.form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

input, select{
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
}

option{
    background:#0f1f3d;
}

button{
    grid-column:span 2;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#1e90ff;
    color:white;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    transform:translateY(-2px);
}

/* list */
.docs{
    margin-top:20px;
    display:grid;
    gap:12px;
}

.card{
    padding:15px;
    border-radius:14px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.type{
    font-size:12px;
    padding:4px 10px;
    border-radius:10px;
    background:#3b82f6;
}

.passport{ background:#22c55e; }
.visa{ background:#f59e0b; }
.id{ background:#a855f7; }
.ticket{ background:#ef4444; }

.delete{
    background:#ef4444;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>📁 Document Tracker</h1>
<p class="subtitle">Store passports, visas and travel documents securely (local vault)</p>

<div class="form">

    <input id="title" placeholder="Document Title (e.g. Passport)">
    
    <select id="type">
        <option value="passport">Passport</option>
        <option value="visa">Visa</option>
        <option value="id">ID Card</option>
        <option value="ticket">Ticket</option>
    </select>

    <input id="country" placeholder="Country (optional)">

    <input id="expiry" type="date">

    <button onclick="addDoc()">+ Add Document</button>

</div>

<div class="docs" id="docs"></div>

</div>

<script>

let docs = JSON.parse(localStorage.getItem("travel_docs") || "[]");

function save(){
    localStorage.setItem("travel_docs", JSON.stringify(docs));
}

function addDoc(){

    const title = document.getElementById("title").value;
    const type = document.getElementById("type").value;
    const country = document.getElementById("country").value;
    const expiry = document.getElementById("expiry").value;

    if(!title){
        alert("Enter document title");
        return;
    }

    docs.push({
        id: Date.now(),
        title,
        type,
        country,
        expiry
    });

    save();
    render();

    document.getElementById("title").value = "";
    document.getElementById("country").value = "";
    document.getElementById("expiry").value = "";
}

function deleteDoc(id){
    docs = docs.filter(d => d.id !== id);
    save();
    render();
}

function render(){

    const container = document.getElementById("docs");
    container.innerHTML = "";

    if(docs.length === 0){
        container.innerHTML = "<p style='color:#b9c7e6'>No documents added yet</p>";
        return;
    }

    docs.forEach(d => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div>
                <strong>${d.title}</strong><br>
                <small style="color:#b9c7e6">${d.country || "No country"} | Exp: ${d.expiry || "N/A"}</small><br>
                <span class="type ${d.type}">${d.type.toUpperCase()}</span>
            </div>

            <button class="delete" onclick="deleteDoc(${d.id})">Delete</button>
        `;

        container.appendChild(div);
    });
}

render();

</script>

</body>
</html>
