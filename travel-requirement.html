<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Eligibility Checker | Travel IO</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:radial-gradient(circle at top,#162a52,#070d1a);
    color:white;
    min-height:100vh;
}

/* HEADER */

header{
    padding:25px 8%;
}

header h1{
    text-align:center;
}

/* CARD */

.container{
    max-width:800px;
    margin:40px auto;
    padding:35px;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.12);
    border-radius:25px;
}

.container h2{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#b9c7e6;
    margin-bottom:35px;
}

/* FORM */

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#d6e3ff;
    font-size:14px;
}

select{
    width:100%;
    padding:14px 16px;

    border-radius:14px;
    border:1px solid rgba(255,255,255,0.15);

    background:rgba(255,255,255,0.08);
    color:white;

    outline:none;
}

option{
    background:#0f1f3d;
    color:white;
}

button{
    width:100%;
    padding:15px;

    border:none;
    border-radius:14px;

    background:#1e90ff;
    color:white;

    font-size:15px;
    font-weight:600;

    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

/* RESULT CARD */

.result-card{
    margin-top:30px;

    padding:25px;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);

    border-radius:18px;

    display:none;
}

.result-card h3{
    margin-bottom:15px;
}

.status{
    font-size:20px;
    font-weight:700;
    margin-bottom:15px;
}

.allowed{
    color:#4ade80;
}

.not-allowed{
    color:#ff6b6b;
}

.info{
    color:#d8e2f7;
    line-height:1.7;
}

</style>
</head>
<body>

<header>
    <h1>🛂 Travel Eligibility Checker - Travel IO</h1>
</header>

<div class="container">

    <h2>Check Travel Eligibility</h2>

    <p class="subtitle">
        "Verify entry requirements, visa status, travel restrictions and more for your next trip. Get real-time eligibility insights"
    </p>

    <div class="form-group">
        <label>Nationality</label>
        <select id="nationality">
            <option>India</option>
            <option>Saudi Arabia</option>
            <option>United States</option>
            <option>United Kingdom</option>
            <option>UAE</option>
        </select>
    </div>

    <div class="form-group">
        <label>Destination Country</label>
        <select id="destination">
            <option>UAE</option>
            <option>Saudi Arabia</option>
            <option>United Kingdom</option>
            <option>United States</option>
            <option>Singapore</option>
        </select>
    </div>

    <div class="form-group">
        <label>Purpose of Travel</label>
        <select id="purpose">
            <option>Tourism</option>
            <option>Business</option>
            <option>Study</option>
            <option>Employment</option>
            <option>Transit</option>
        </select>
    </div>

    <div class="form-group">
        <label>Do You Have A Valid Visa?</label>
        <select id="visa">
            <option>Yes</option>
            <option>No</option>
        </select>
    </div>

    <button onclick="checkEligibility()">
        Check Eligibility
    </button>

    <div class="result-card" id="result">

        <h3>Travel Decision</h3>

        <div class="status" id="status">
            --
        </div>

        <div class="info" id="details">
            --
        </div>

    </div>

</div>

<script>

function checkEligibility(){

    const nationality =
        document.getElementById("nationality").value;

    const destination =
        document.getElementById("destination").value;

    const visa =
        document.getElementById("visa").value;

    const result =
        document.getElementById("result");

    const status =
        document.getElementById("status");

    const details =
        document.getElementById("details");

    result.style.display = "block";

    // SAMPLE RULES

    if(visa === "Yes"){

        status.innerHTML =
        "✅ Eligible To Travel";

        status.className =
        "status allowed";

        details.innerHTML =
        `
        Nationality: ${nationality}<br>
        Destination: ${destination}<br>
        Visa Status: Valid Visa Available
        `;

    }

    else{

        status.innerHTML =
        "❌ Eligibility Cannot Be Confirmed";

        status.className =
        "status not-allowed";

        details.innerHTML =
        `
        A valid visa may be required before travel.
        Please verify destination entry requirements.
        `;

    }
    function checkEligibility(nationality, destination, purpose, data){

    let visaType = getVisaType(destination, data);

    let risk = data.highRisk.includes(destination) ? "HIGH" : "LOW";

    return {
        destination,
        visaType,
        risk,
        eligible: visaType !== "VISA_REQUIRED" || purpose !== "tourism"
    };
}

}

</script>

</body>
</html>
